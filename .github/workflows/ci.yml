name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Tests need a SQLite db. Prisma generates the client + db push
      # creates the schema; no real data fixtures required.
      DATABASE_URL: file:./prisma/dev.db
      # Disable outbound LLM calls in CI (tests should be hermetic).
      ENABLE_LLM_CALLS: "false"
      # NextAuth secret — any value is fine for typecheck/test, just
      # has to be present to avoid the runtime error.
      NEXTAUTH_SECRET: ci-test-secret-not-for-production
      AUTH_SECRET: ci-test-secret-not-for-production
      # Per-tenant secret encryption key — stable across CI runs.
      BCON_VAULT_KEY: ci-vault-key-not-for-production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema (creates the SQLite db)
        run: npx prisma db push --accept-data-loss

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest
        run: npx vitest run

      - name: Seed portal catalog (smoke check)
        run: npx tsx prisma/seed-portals.ts

      - name: Dependency security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Generate SBOM (CycloneDX)
        run: |
          npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json || echo "SBOM generation skipped"
        continue-on-error: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          if-no-files-found: ignore
